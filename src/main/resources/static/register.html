<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js"></script>
</head>
<body>
    <div class="auth-wrapper">
        <button class="btn btn-small" onclick="toggleTheme()" id="themeBtn" style="position:absolute; top:25px; right:25px; background:var(--glass-bg); color:var(--text-main); border:1px solid var(--glass-border); width:45px; height:45px; padding:0; border-radius:50%; font-size:20px; z-index:100; cursor:pointer;" title="Toggle Theme">☀️</button>
        <div class="glass auth-card">
            <div class="auth-header">
                <h1>Create Account ✨</h1>
                <p>Register to manage student attendance.</p>
            </div>
            
            <input type="text" id="fullName" placeholder="Full Legal Name" autocomplete="off" />
            <input type="text" id="username" placeholder="Choose a Username" autocomplete="off" />
            <input type="password" id="password" placeholder="Create a secure Password" />
            
            <button class="btn btn-blue" id="regBtn" onclick="register()">Create Admin Account</button>
            
            <div class="auth-switch">
                Already have an account? <a href="/login.html">Sign in here</a>
            </div>
        </div>
    </div>

    <script>
        // --- THEME ENGINE ---
        let isLightMode = localStorage.getItem('theme') === 'light';
        if(isLightMode) document.documentElement.setAttribute('data-theme', 'light');

        function updateThemeBtn() {
            const btn = document.getElementById('themeBtn');
            if(btn) btn.innerText = isLightMode ? '🌙' : '☀️';
        }
        updateThemeBtn();

        function toggleTheme() {
            isLightMode = !isLightMode;
            if(isLightMode) {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
            }
            updateThemeBtn();
        }

        async function register() {
            const fullName = document.getElementById('fullName').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('regBtn');

            if(!username || !password || !fullName) { showToast('Please fill all fields.', 'error'); return; }

            btn.innerText = "Registering...";
            try {
                const res = await fetch(`${API}/api/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({fullName, username, password})
                });
                const responseData = await res.text();
                
                if (res.ok) {
                    showToast('🎉 Account created! Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = '/login.html', 1500);
                } else {
                    showToast(responseData, 'error');
                }
            } catch(e) { 
                showToast('Network error computing logic.', 'error'); 
            } finally { 
                btn.innerText = "Create Admin Account"; 
            }
        }
        
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') register();
        });
    </script>
</body>
</html>
