<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js"></script>
</head>
<body>
    <div class="auth-wrapper">
        <button class="btn btn-small" onclick="toggleTheme()" id="themeBtn" style="position:absolute; top:25px; right:25px; background:var(--glass-bg); color:var(--text-main); border:1px solid var(--glass-border); width:45px; height:45px; padding:0; border-radius:50%; font-size:20px; z-index:100; cursor:pointer;" title="Toggle Theme">☀️</button>
        <div class="glass auth-card">
            <div class="auth-header">
                <h1>Welcome Back 👋</h1>
                <p>Sign in to your administration dashboard.</p>
            </div>
            
            <input type="text" id="username" placeholder="Username" autocomplete="off" />
            <input type="password" id="password" placeholder="Password" />
            
            <button class="btn btn-primary" id="loginBtn" onclick="login()">Enter Secure Portal</button>
            
            <div class="auth-switch">
                Don't have an account? <a href="/register.html">Register an Admin Account</a>
            </div>
        </div>
    </div>

    <script>
        // --- THEME ENGINE ---
        let isLightMode = localStorage.getItem('theme') === 'light';
        if(isLightMode) document.documentElement.setAttribute('data-theme', 'light');

        function updateThemeBtn() {
            const btn = document.getElementById('themeBtn');
            if(btn) btn.innerText = isLightMode ? '🌙' : '☀️';
        }
        updateThemeBtn();

        function toggleTheme() {
            isLightMode = !isLightMode;
            if(isLightMode) {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
            }
            updateThemeBtn();
        }

        // If already logged in, go to index
        if (sessionStorage.getItem('user')) { window.location.href = '/index.html'; }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if(!username || !password) { showToast('Please enter username and password.', 'error'); return; }

            btn.innerText = "Verifying Credentials...";
            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                if (res.ok) {
                    const userData = await res.json();
                    sessionStorage.setItem('user', JSON.stringify(userData));
                    window.location.href = '/index.html';
                } else {
                    const msg = await res.text();
                    showToast(msg, 'error');
                }
            } catch(e) { 
                showToast('Network error computing logic. Is the server running?', 'error'); 
            } finally { 
                btn.innerText = "Enter Secure Portal"; 
            }
        }
        
        // Enter key support
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
